<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인도네시아 골프장 지도 | Indonesia Golf Club Map</title>
  <meta name="description" content="인도네시아 전역 91개 골프장 위치와 정보를 한눈에 — 주소·홀 구성·설계자·부대시설" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo-dot"></span>
      <h1>Indonesia Golf Club</h1>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="map" role="tab" aria-selected="true">🗺️ 지도</button>
      <button class="tab" data-tab="table" role="tab" aria-selected="false">📋 골프장 상세</button>
    </nav>
    <div class="topbar-meta">
      <span class="counter"><strong id="visibleCount">0</strong> / <span id="totalCount">0</span> 개</span>
    </div>
  </header>

  <main class="layout" id="mapView" data-view="map">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <input type="search" id="searchInput" placeholder="🔍 골프장 이름·지역·설계자 검색" autocomplete="off" />
      </div>

      <div class="filters">
        <div class="filter-group">
          <label>지역</label>
          <div class="chips" id="regionChips"></div>
        </div>
        <div class="filter-group">
          <label>홀 수</label>
          <div class="chips" id="holesChips">
            <button class="chip active" data-holes="all">전체</button>
            <button class="chip" data-holes="9">9홀</button>
            <button class="chip" data-holes="18">18홀</button>
            <button class="chip" data-holes="27+">27홀+</button>
          </div>
        </div>
        <div class="filter-group">
          <label>운영 상태</label>
          <div class="chips" id="statusChips">
            <button class="chip active" data-status="operating-only">운영중만</button>
            <button class="chip" data-status="all">전체</button>
            <button class="chip" data-status="closed_temporary">휴장</button>
            <button class="chip" data-status="uncertain">불확실</button>
          </div>
        </div>
      </div>

      <div class="course-list" id="courseList"></div>
    </aside>

    <section class="map-wrap">
      <div id="map"></div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="사이드바 토글">☰</button>
    </section>

    <aside class="detail-panel" id="detailPanel" aria-hidden="true">
      <button class="close-btn" id="closeDetail" aria-label="닫기">×</button>
      <div class="detail-content" id="detailContent"></div>
    </aside>
  </main>

  <section class="table-view" id="tableView" hidden>
    <div class="table-toolbar">
      <input type="search" id="tableSearch" placeholder="🔍 검색 (이름·지역·설계자·주소)" autocomplete="off" />
      <select id="tableStatusFilter">
        <option value="operating-only">운영중만</option>
        <option value="all">전체</option>
        <option value="closed_temporary">임시 휴장</option>
        <option value="closed_permanent">영구 폐장</option>
        <option value="uncertain">불확실</option>
      </select>
      <select id="tableRegionFilter"><option value="all">모든 지역</option></select>
      <span class="table-counter"><strong id="tableVisibleCount">0</strong>개 표시</span>
      <button id="exportCsv" class="export-btn">📥 CSV 다운로드</button>
    </div>
    <div class="table-scroll">
      <table class="course-table">
        <thead>
          <tr>
            <th data-sort="name_en">골프장명 ▾</th>
            <th data-sort="region">지역</th>
            <th data-sort="province">주(Province)</th>
            <th data-sort="status">운영상태</th>
            <th data-sort="holes" class="num">홀</th>
            <th data-sort="par" class="num">파</th>
            <th data-sort="year_opened" class="num">개장</th>
            <th data-sort="designer">설계자</th>
            <th data-sort="weekday_fee" class="num">평일</th>
            <th data-sort="weekend_fee" class="num">주말</th>
            <th>설명</th>
            <th>주소 / 연락</th>
            <th>출처</th>
          </tr>
        </thead>
        <tbody id="courseTableBody"></tbody>
      </table>
    </div>
  </section>

  <footer class="footer">
    데이터 출처: APLGI · GolfPass · GolfAsian · 공식 골프장 사이트 ·
    지도: © OpenStreetMap contributors · 지오코딩: Nominatim ·
    <a href="https://github.com/moon470an-sys/Indonesia-Golf-Club" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
</html>
